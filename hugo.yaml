# Hugo configuration file
title: PasarGuard Documentation
baseURL: "https://pasarguard.github.io"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: fa
languages:
  en:
    languageName: English
    weight: 1
    title: PasarGuard Documentation
  fa:
    languageName: فارسی
    weight: 2
    title: مستندات پاسارگارد
    languageDirection: rtl
  ru:
    languageName: Русский
    weight: 3
    title: Документация PasarGuard
  zh:
    languageName: 中文
    weight: 4
    title: PasarGuard 文档


  # enable hextra syntax highlight
  highlight:
    noClasses: false

# Global menu configuration
menu:
  main:
    - identifier: About
      name: About
      pageRef: /
      weight: 2

    - identifier: Home
      name: Home
      pageRef: /
      weight: 1

    - identifier: Contact
      name: Contact
      url: "https://t.me/PasargaurdGP"
      weight: 3
    
    - name: Search
      weight: 4
      params:
        type: search
      
    - name: GitHub
      weight: 5
      url: "https://github.com/PasarGuard"
      params:
        icon: github
    
    - name: Telegram
      weight: 6
      url: "https://t.me/Pasar_Guard"
      params:
        icon: telegram

params:
  navbar:
    displayTitle: true
    displayLogo: false
    logo:
      path: assets/logos/white.png
      dark: assets/logos/white.png
      light: assets/logos/black.png

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/PasarGuard/PasarGuard.github.io/edit/main/content"

  search:
    enable: true
    type: flexsearch

  theme:
    # light | dark | system
    default: system
    displayToggle: true
